name: PictureKey
type: Key
version: 1
layout: layout.svg

bindings:
  label:
    type: text
    node: text
    default: "Label"
    max_width: 96
    wrap: true
    max_height: 76
    overflow: ellipsis

  picture:
    type: image
    node: picture

events:
  - name: click
    source: key_press_release
    max_duration_ms: 300
