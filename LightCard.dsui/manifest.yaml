name: LightCard
type: TouchStripCard
version: 1
layout: layout.svg

bindings:
  lights:
    type: toggle
    node_on: lights_on
    node_off: lights_off
    default: false

  brightness_value_text:
    type: text
    node: brightness_value_text
    default: "0%"

  brightness:
    type: slider
    node: brightness_indicator
    default: 0.0
    direction: horizontal
    min_pos: 1.5
    max_pos: 183.5

  kelvin_value_text:
    type: text
    node: kelvin_value_text
    default: "2000K"

  kelvin:
    type: slider
    node: kelvin_indicator
    default: 0.0
    direction: horizontal
    min_pos: 1.5
    max_pos: 183.5

events:
  - name: toggle
    source: encoder_press_release

  - name: brightness_up
    source: encoder_turn
    direction: right

  - name: brightness_down
    source: encoder_turn
    direction: left

  - name: kelvin_up
    source: encoder_press_turn
    direction: right

  - name: kelvin_down
    source: encoder_press_turn
    direction: left

regions:
  card:
    x: 0
    y: 0
    width: 197
    height: 98
    events: [tap, long_press]
